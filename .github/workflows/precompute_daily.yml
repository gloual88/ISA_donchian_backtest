name: Daily Signal Precompute

# 평일 한국장 마감 후 — 백업 포함 2회 예약(GitHub cron 지연/누락 대비).
# 같은 종가일(asof)로는 alert_email이 1통만 발송(중복 방지 가드)하므로 안전.
#   07:30 UTC = 16:30 KST (1차) / 10:00 UTC = 19:00 KST (백업)
on:
  schedule:
    - cron: "30 7 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:      # 수동 실행 — 정정 재발송 옵션
    inputs:
      subject_prefix:
        description: "제목 접두 (정정 발송: [정정] )"
        required: false
        default: ""
      force_email:
        description: "중복방지 무시 강제 발송 (1)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Precompute signals
        run: python precompute_signals.py

      - name: Send action alert (email)
        continue-on-error: true   # 이메일 실패가 시그널 커밋을 막지 않도록 분리(데이터 파이프라인 보호)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          NEAR_STOP_PCT: "3.0"
          ANCHOR_DATE: "2026-06-02"
          SUBJECT_PREFIX: ${{ github.event.inputs.subject_prefix }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
        run: python alert_email.py

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/last_email_sent.txt
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: daily signals $(date -u +%Y-%m-%d)"
            git push
          fi
