name: Daily Signal Precompute

# 매일 06:00 KST (21:00 UTC) — 미국/한국 종가 반영 후
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Precompute signals
        run: python precompute_signals.py

      - name: Send action alert (email)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          NEAR_STOP_PCT: "3.0"
          ANCHOR_DATE: "2026-03-31"
        run: python alert_email.py

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: daily signals $(date -u +%Y-%m-%d)"
            git push
          fi
